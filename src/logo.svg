<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d06f"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#1f2235"/>

  <!-- Circle -->
  <circle
    cx="256"
    cy="256"
    r="150"
    fill="none"
    stroke="url(#gold)"
    stroke-width="10"
  />

  <!-- Letter M -->
  <text
    x="50%"
    y="62%"
    text-anchor="middle"
    font-size="220"
    font-family="Georgia, serif"
    fill="url(#gold)"
    font-weight="bold"
  >
    M
  </text>
</svg>
